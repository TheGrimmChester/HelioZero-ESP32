openapi: 3.0.0
info:
  title: HelioZero API
  version: "1.0"
  description: |
    REST JSON API for the HelioZero ESP32 PV excess router firmware.
    Served on HTTP port 80 (STA or soft-AP). Keys use English `snake_case`.
    Optional Bearer auth when an API password is configured (`POST /api/v1/auth/login` for sessions,
    `POST /api/v1/auth/tokens` for permanent automation tokens);
    see /en/http-api-security/. On-device `GET /api/v1/openapi.json` exposes
    a compact path index only; this repository YAML is the full contract.

servers:
  - url: http://{device}
    description: Device on LAN or setup AP (e.g. 192.168.4.1)
    variables:
      device:
        default: 192.168.1.50

tags:
  - name: Telemetry
    description: Live measurements, state, and history
  - name: Configuration
    description: Router settings, time, PWM
  - name: Actions
    description: Routing actions config and overrides
  - name: Sources
    description: Metering sources and diagnostics
  - name: History
    description: Power and energy history
  - name: GPIO
    description: GPIO read/write for live diagrams
  - name: Network
    description: Wi-Fi setup and public bootstrap
  - name: System
    description: Device info, health, reboot, EEPROM
  - name: MQTT
    description: Home Assistant MQTT helpers
  - name: Fleet
    description: Signed config export/import
  - name: Lab
    description: HIL/lab-only endpoints (not in production OpenAPI embed)

security:
  - bearerAuth: []

paths:
  /api/v1/measurements:
    get:
      tags: [Telemetry]
      operationId: getMeasurements
      summary: Current metering snapshot
      description: House incomer and optional second channel power/energy plus raw meter fields.
      responses:
        "200":
          description: Measurements JSON
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Measurements"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/tariff/tempo:
    get:
      tags: [Telemetry]
      operationId: getTariffTempo
      summary: EDF Tempo tariff status (RTE open data)
      description: Populated when `tempo_rte_enabled` is set in config.
      responses:
        "200":
          description: Tempo fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TempoTariffStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/state:
    get:
      tags: [Telemetry]
      operationId: getState
      summary: Aggregated live state
      description: Measurements, actions live summary, triac percent, overrides, and clock.
      responses:
        "200":
          description: State envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StateEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/telemetry/snapshot:
    get:
      tags: [Telemetry]
      operationId: getTelemetrySnapshot
      summary: MQTT Home Assistant state JSON equivalent
      description: |
        Same key set as the MQTT `{prefix}/{device}_state` topic (capability-gated).
        Use for REST-only automations and HACS `rest_only` entity polling.
      x-helio-mqtt-parity: info-retrieval
      responses:
        "200":
          description: Telemetry snapshot object
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/triac/override:
    post:
      tags: [Control]
      operationId: postTriacOverride
      summary: Set triac AUTO or fixed percent (MQTT triac/set parity)
      x-helio-mqtt-parity: control
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TriacOverrideRequest"
      responses:
        "200":
          description: Override applied
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/history/power:
    get:
      tags: [History]
      operationId: getHistoryPower
      summary: Power history time series
      description: |
        `window=48h` (default) returns 5-minute buckets with temperature series.
        `window=10m` returns 2-second buckets with apparent VA arrays.
      parameters:
        - $ref: "#/components/parameters/historyWindow"
        - $ref: "#/components/parameters/historyMaxPoints"
      responses:
        "200":
          description: History arrays
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryPower"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/history/energy/daily:
    get:
      tags: [History]
      operationId: getHistoryEnergyDaily
      summary: Daily energy deltas (year ring buffer)
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 10
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: from_date
          in: query
          required: false
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
        - name: to_date
          in: query
          required: false
          schema:
            type: string
            pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$"
      responses:
        "200":
          description: Daily Wh deltas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HistoryEnergyDaily"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /api/v1/history/energy/daily/import:
    post:
      tags: [History]
      operationId: postHistoryEnergyDailyImport
      summary: Import daily CH1/CH2 energy history from CSV
      requestBody:
        required: true
        content:
          text/csv:
            schema:
              type: string
      responses:
        "200":
          description: Import applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"

  /api/v1/history/reset:
    post:
      tags: [History]
      operationId: postHistoryReset
      summary: Clear consumption history and RAM buffers
      description: Clears EEPROM consumption history and in-memory power buffers.
      responses:
        "200":
          description: History cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOk"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/config:
    get:
      tags: [Configuration]
      operationId: getConfig
      summary: Full router configuration
      responses:
        "200":
          description: Config envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Configuration]
      operationId: putConfig
      summary: Replace configuration (full PUT)
      description: >
        Body must be a JSON object with a "config" property containing the full
        router settings. Persists to EEPROM.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfigPutBody"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EepromOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
    patch:
      tags: [Configuration]
      operationId: patchConfig
      summary: Partial configuration update
      description: Flat partial keys at the JSON root (not nested under `config`). Persists to EEPROM.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouterConfig"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EepromOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"

  /api/v1/pwm:
    get:
      tags: [Configuration]
      operationId: getPwm
      summary: PWM output status
      responses:
        "200":
          description: PWM config and effective duty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PwmStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Configuration]
      operationId: putPwm
      summary: Update PWM settings
      description: Partial update; persists to EEPROM and re-inits hardware.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PwmPutRequest"
      responses:
        "200":
          description: Updated PWM status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PwmStatus"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/time:
    get:
      tags: [Configuration]
      operationId: getTime
      summary: Timezone and NTP settings
      responses:
        "200":
          description: Time info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Configuration]
      operationId: putTime
      summary: Update timezone / NTP servers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TimePutRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/actions:
    get:
      tags: [Actions]
      operationId: getActionsLive
      summary: Live action slots (regulating actions only)
      responses:
        "200":
          description: Actions live
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionsLive"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/actions/schema:
    get:
      tags: [Actions]
      operationId: getActionsSchema
      summary: Action config schema metadata
      responses:
        "200":
          description: Schema hints
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionsSchema"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/actions/config:
    get:
      tags: [Actions]
      operationId: getActionsConfig
      summary: All action configurations
      responses:
        "200":
          description: Actions config envelope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionsConfigEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [Actions]
      operationId: putActionsConfig
      summary: Replace all action configurations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionsConfigEnvelope"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
    patch:
      tags: [Actions]
      operationId: patchActionsConfig
      summary: Batch partial action config update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/actions/config/{index}:
    parameters:
      - $ref: "#/components/parameters/actionIndex"
    get:
      tags: [Actions]
      operationId: getActionConfig
      summary: Single action configuration
      responses:
        "200":
          description: One action config object
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionConfig"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    put:
      tags: [Actions]
      operationId: putActionConfig
      summary: Replace one action configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActionConfig"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Actions]
      operationId: patchActionConfig
      summary: Partial update for one action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/actions/{index}/override:
    parameters:
      - $ref: "#/components/parameters/actionIndex"
    get:
      tags: [Actions]
      operationId: getActionOverride
      summary: Current override for an action slot
      responses:
        "200":
          description: Override state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ActionOverride"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Actions]
      operationId: postActionOverride
      summary: Set manual override (ON/OFF/triac_fixed/AUTO)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OverrideRequest"
      responses:
        "200":
          description: Override applied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverridePostResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/actions/{index}/override/clear:
    parameters:
      - $ref: "#/components/parameters/actionIndex"
    post:
      tags: [Actions]
      operationId: postActionOverrideClear
      summary: Clear override (return to AUTO)
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                type: object
                required: [ok, state]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  state:
                    type: string
                    enum: [auto]
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/sources:
    get:
      tags: [Sources]
      operationId: getSources
      summary: Supported and active metering sources
      responses:
        "200":
          description: Sources info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourcesInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/sources/diagnostics:
    get:
      tags: [Sources]
      operationId: getSourcesDiagnostics
      summary: Detailed metering diagnostics
      parameters:
        - $ref: "#/components/parameters/linkyTail"
      responses:
        "200":
          description: Diagnostics payload (shape varies by source)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SourceDiagnostics"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/sources/brute_panel:
    get:
      tags: [Sources]
      operationId: getSourcesBrutePanel
      summary: Vendor debug panel JSON
      description: Dynamic shape depending on active source. Optional query `idx` for HelioPeer peer polling.
      parameters:
        - name: idx
          in: query
          required: false
          schema:
            type: integer
          description: Panel index (used by HelioPeer peer default path builder)
      responses:
        "200":
          description: Source-specific debug JSON
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/sources/test/inject:
    post:
      tags: [Lab]
      operationId: postSourcesTestInject
      summary: Inject measurement-shaped JSON (HIL builds only)
      description: |
        Available only when firmware is built with `HELIO_ZERO_ENABLE_SOURCE_TEST_API`
        (`pio run -e hil`). Omitted from production OpenAPI embed on device.
      x-helio-build: hil
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Measurements"
      responses:
        "200":
          description: Injected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Not available on production builds

  /api/v1/gpio:
    get:
      tags: [GPIO]
      operationId: getGpio
      summary: GPIO levels for live diagrams
      description: Returns levels for pins 0–33 except SPI flash bus (read mask wider than write mask).
      responses:
        "200":
          description: Pin levels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpioLevels"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [GPIO]
      operationId: putGpio
      summary: Drive one GPIO output
      description: Rejects router-critical pins (triac, UART, LEDs, OneWire, flash straps, etc.).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpioPutRequest"
      responses:
        "200":
          description: Pin set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GpioPutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/public:
    get:
      tags: [Network]
      operationId: getPublic
      summary: Non-sensitive UI bootstrap
      description: Always readable without HTTP API password.
      security: []
      responses:
        "200":
          description: Public bootstrap
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PublicInfo"

  /api/v1/auth/login:
    post:
      tags: [System]
      operationId: postAuthLogin
      summary: Create API session
      description: |
        When HTTP API password is enabled, returns a session token for `Authorization: Bearer …`.
        Open without credentials. When auth is disabled, returns `{ok:true}` without a token.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthLoginRequest"
      responses:
        "200":
          description: Login result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthLoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/logout:
    post:
      tags: [System]
      operationId: postAuthLogout
      summary: End API session
      description: Clears the active server session; requires a valid Bearer token when auth is enabled.
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiOk"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/tokens:
    get:
      tags: [System]
      operationId: getAuthTokens
      summary: List API access tokens
      description: |
        Lists persisted personal access tokens (labels and ids only). Requires HTTP API auth.
        Returns 400 when API password is not enabled.
      responses:
        "200":
          description: Token list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthTokenInfo"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [System]
      operationId: postAuthTokens
      summary: Create API access token
      description: |
        Creates a persisted bearer token for automation (Home Assistant, scripts). The secret
        `token` is returned once at creation; the secret is stored in EEPROM (included in
        `GET /api/v1/system/backup` export). Max 4 tokens.
        Changing the HTTP API password revokes all tokens.
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AuthTokenCreateRequest"
      responses:
        "200":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthTokenCreateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/tokens/{id}:
    delete:
      tags: [System]
      operationId: deleteAuthToken
      summary: Revoke API access token
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 255
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/wifi:
    get:
      tags: [Network]
      operationId: getWifi
      summary: Wi-Fi status
      description: Open during AP captive-portal setup even when API auth is enabled.
      security: []
      responses:
        "200":
          description: Wi-Fi info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WifiInfo"
    put:
      tags: [Network]
      operationId: putWifi
      summary: Join Wi-Fi network
      description: |
        Open during AP setup. When `persist` is true (default), saves credentials and schedules reboot.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WifiPutRequest"
      responses:
        "200":
          description: Reconnect started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WifiPutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/v1/wifi/scan:
    get:
      tags: [Network]
      operationId: getWifiScan
      summary: Scan surrounding Wi-Fi networks
      description: Returns 202 while scan is in progress. Open during AP setup.
      security: []
      responses:
        "200":
          description: Scan complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WifiScanResult"
        "202":
          description: Scan in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WifiScanInProgress"

  /api/v1/system:
    get:
      tags: [System]
      operationId: getSystem
      summary: Runtime system metrics
      responses:
        "200":
          description: System info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/system/audit:
    get:
      tags: [System]
      operationId: getSystemAudit
      summary: Recent config change audit log (RAM ring)
      description: Route names and changed keys only; secrets are never logged.
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfigAuditEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/device:
    get:
      tags: [System]
      operationId: getDevice
      summary: Device identity and firmware/chip info
      responses:
        "200":
          description: Device info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/health:
    get:
      tags: [System]
      operationId: getHealth
      summary: Health and commissioning self-test status
      responses:
        "200":
          description: Health info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/health/self-test/run:
    post:
      tags: [System]
      operationId: postHealthSelfTestRun
      summary: Start commissioning self-test
      responses:
        "200":
          description: Test started
          content:
            application/json:
              schema:
                type: object
                required: [ok, running]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  running:
                    type: boolean
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/health/self-test/skip:
    post:
      tags: [System]
      operationId: postHealthSelfTestSkip
      summary: Skip commissioning self-test
      description: Persists skip flag to EEPROM.
      responses:
        "200":
          description: Skipped
          content:
            application/json:
              schema:
                type: object
                required: [ok, skipped]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  skipped:
                    type: boolean
                    enum: [true]
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/system/reboot:
    post:
      tags: [System]
      operationId: postSystemReboot
      summary: Reboot device
      description: Schedules reboot after ~500 ms.
      responses:
        "200":
          description: Reboot scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOk"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/system/factory-reset:
    post:
      tags: [System]
      operationId: postSystemFactoryReset
      summary: Factory reset and reboot
      description: |
        Clears HTTP API password, consumption history, and action EEPROM pointer.
        Open when not in pure STA mode (AP setup). Schedules reboot.
      security: []
      responses:
        "200":
          description: Reset scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageOk"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/system/save-now:
    post:
      tags: [System]
      operationId: postSystemSaveNow
      summary: Persist current settings to EEPROM
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EepromOk"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/system/eeprom:
    get:
      tags: [System]
      operationId: getSystemEeprom
      summary: EEPROM usage summary
      responses:
        "200":
          description: EEPROM stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EepromInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/system/arduino-ota:
    get:
      tags: [System]
      operationId: getSystemArduinoOta
      summary: Arduino IDE OTA password status
      responses:
        "200":
          description: OTA info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArduinoOtaInfo"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [System]
      operationId: putSystemArduinoOta
      summary: Set Arduino OTA password
      description: Empty password clears protection. Schedules reboot after save.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordPutRequest"
      responses:
        "200":
          description: Saved; reboot scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArduinoOtaPutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/system/http-auth:
    put:
      tags: [System]
      operationId: putSystemHttpAuth
      summary: Enable or disable HTTP API password
      description: |
        Body `{"password":""}` clears auth. Open when auth is disabled (first password),
        or in AP mode for lockout recovery. Requires existing credentials when auth is on.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasswordPutRequest"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HttpAuthPutResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/system/backup:
    get:
      tags: [System]
      operationId: getSystemBackup
      summary: Export device backup
      description: |
        Full user backup JSON assembled on the device (config, actions, time, Wi‑Fi, and when
        HTTP API auth is enabled the API password and permanent access token secrets from EEPROM).
        Same shape as the Settings → Backup download file.
      responses:
        "200":
          description: Backup document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelioZeroBackup"
        "401":
          $ref: "#/components/responses/Unauthorized"
    put:
      tags: [System]
      operationId: putSystemBackup
      summary: Restore device backup
      description: |
        Applies a backup document from export. Replaces config, actions, time, Wi‑Fi, HTTP API
        password, and permanent access tokens, then persists to EEPROM. Open on soft-AP during
        setup when HTTP auth is enabled (same as other restore routes).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HelioZeroBackup"
      responses:
        "200":
          description: Restored and persisted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EepromOk"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/firmware/ota:
    post:
      tags: [System]
      operationId: postFirmwareOta
      summary: Upload firmware binary (web OTA)
      description: |
        Multipart upload of `.bin` firmware. Optional MD5 via form field or query `md5`.
        Requires HTTP API auth when enabled. Reboots on success.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                firmware:
                  type: string
                  format: binary
                  description: ESP32 application binary
            encoding:
              firmware:
                contentType: application/octet-stream
      parameters:
        - name: md5
          in: query
          required: false
          schema:
            type: string
          description: Expected MD5 hex digest of the binary
      responses:
        "200":
          description: Update OK; reboot scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FirmwareOtaResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/fleet/export:
    get:
      tags: [Fleet]
      operationId: getFleetExport
      summary: Export signed configuration bundle
      description: Unsigned JSON plus HMAC signature when `fleet_trust_key` is configured.
      responses:
        "200":
          description: Fleet bundle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetExport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"

  /api/v1/fleet/import:
    post:
      tags: [Fleet]
      operationId: postFleetImport
      summary: Import signed configuration bundle
      description: Requires `fleet_trust_key` in device config. Use `dry_run` to validate only.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FleetImportRequest"
      responses:
        "200":
          description: Imported or validated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FleetImportResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/v1/fleet/trust-key:
    put:
      tags: [Fleet]
      operationId: putFleetTrustKey
      summary: Set fleet HMAC trust key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fleet_trust_key]
              properties:
                fleet_trust_key:
                  type: string
                  maxLength: 64
      responses:
        "200":
          description: Key saved
          content:
            application/json:
              schema:
                type: object
                required: [ok, configured]
                properties:
                  ok:
                    type: boolean
                    enum: [true]
                  configured:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/mqtt/discover:
    post:
      tags: [MQTT]
      operationId: postMqttDiscover
      summary: Republish Home Assistant MQTT discovery
      responses:
        "200":
          description: Discovery republished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MqttActionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/mqtt/reconnect:
    post:
      tags: [MQTT]
      operationId: postMqttReconnect
      summary: Schedule MQTT reconnect
      responses:
        "200":
          description: Reconnect scheduled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MqttActionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/mqtt/publish-now:
    post:
      tags: [MQTT]
      operationId: postMqttPublishNow
      summary: Publish MQTT state immediately
      responses:
        "200":
          description: Publish triggered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MqttActionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/mqtt/test:
    post:
      tags: [MQTT]
      operationId: postMqttTest
      summary: Test MQTT broker connection
      description: Optional JSON body overrides broker fields without saving config.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MqttTestRequest"
      responses:
        "200":
          description: Broker reachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MqttTestResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "502":
          description: Broker unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MqttTestResponse"

  /api/v1/sources/pmqtt/preview:
    post:
      tags: [Sources]
      operationId: postPmqttPreview
      summary: Preview Pmqtt bindings against recent MQTT payload cache
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PmqttPreviewRequest"
      responses:
        "200":
          description: Preview results per binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PmqttPreviewResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/openapi.json:
    get:
      tags: [System]
      operationId: getOpenapi
      summary: OpenAPI path index (compact)
      description: Returns paths-only OpenAPI 3.0 JSON embedded in firmware (no full schemas).
      responses:
        "200":
          description: OpenAPI document
          content:
            application/json:
              schema:
                type: object
                required: [openapi, info, paths]
                properties:
                  openapi:
                    type: string
                    example: "3.0.0"
                  info:
                    type: object
                  paths:
                    type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: hex64
      description: |
        Session token from `POST /api/v1/auth/login` when HTTP API password is enabled.
        See /en/http-api-security/.

  parameters:
    actionIndex:
      name: index
      in: path
      required: true
      schema:
        type: integer
        minimum: 0
        maximum: 19
      description: Action slot index (0 = triac/cumulus, max 19)
    historyWindow:
      name: window
      in: query
      required: false
      schema:
        type: string
        enum: [48h, 10m]
        default: 48h
      description: History time window
    historyMaxPoints:
      name: max_points
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 600
        default: 200
      description: Maximum points returned (capped at 600)
    linkyTail:
      name: linky_tail
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 2048
      description: Max Linky TIC tail bytes in diagnostics response

  responses:
    BadRequest:
      description: Invalid request or validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Valid API session required (Bearer token from login)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Operation not allowed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PayloadTooLarge:
      description: Request body too large
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    Error:
      type: object
      required: [error, message]
      properties:
        error:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable detail

    ApiOk:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]
      additionalProperties: true

    MessageOk:
      type: object
      required: [ok, message]
      properties:
        ok:
          type: boolean
          enum: [true]
        message:
          type: string

    EepromOk:
      type: object
      required: [ok, eeprom_bytes]
      properties:
        ok:
          type: boolean
          enum: [true]
        eeprom_bytes:
          type: integer
          description: EEPROM write address or bytes written

    MeterChannel:
      type: object
      properties:
        house_load_w:
          type: integer
          description: Foyer demand (W) when exposed
        pv_production_w:
          type: integer
          description: PV production (W)
        grid_net_w:
          type: integer
          description: Net grid exchange; import positive, export negative (W)
        active_import_w:
          type: integer
        active_export_w:
          type: integer
        apparent_import_va:
          type: integer
        apparent_export_va:
          type: integer
        energy_day_import_wh:
          type: number
        energy_day_export_wh:
          type: number
        energy_total_import_wh:
          type: number
        energy_total_export_wh:
          type: number

    RawMeter:
      type: object
      properties:
        voltage_house_v:
          type: number
        current_house_a:
          type: number
        pf_house:
          type: number
        voltage_second_v:
          type: number
        current_second_a:
          type: number
        pf_second:
          type: number
        freq_hz:
          type: number
        house_net_power_w:
          type: number
        second_net_power_w:
          type: number

    MeasurementDiagnostics:
      type: object
      properties:
        adc_clipping:
          type: boolean
        regulation_hunting:
          type: boolean
        source_health:
          type: integer
          minimum: 0
          maximum: 100
        source_stale:
          type: boolean
        regulation_active:
          type: boolean
        site_cap_active:
          type: boolean
        mqtt_connected:
          type: boolean

    TriacOverrideRequest:
      type: object
      required: [command]
      properties:
        command:
          type: string
          description: "`AUTO` or percent `0`–`100` (same as MQTT `triac/set`)."

    Measurements:
      type: object
      required: [house, second, raw_meter]
      properties:
        date_valid:
          type: boolean
        date:
          type: string
        source:
          type: string
        linky_tariff:
          type: string
        house:
          $ref: "#/components/schemas/MeterChannel"
        second:
          $ref: "#/components/schemas/MeterChannel"
        raw_meter:
          $ref: "#/components/schemas/RawMeter"
        diagnostics:
          $ref: "#/components/schemas/MeasurementDiagnostics"

    TempoTariffStatus:
      type: object
      properties:
        enabled:
          type: boolean
        ltarf:
          type: string
        tomorrow_stge:
          type: string
        today_color:
          type: string
        tomorrow_color:
          type: string
        tariff_code:
          type: integer
        ltarf_bin:
          type: integer
        stale:
          type: boolean
        last_fetch_epoch:
          type: integer
          format: int64

    HistoryPower:
      type: object
      properties:
        source:
          type: string
        window:
          type: string
        max_points:
          type: integer
        sample_period_s:
          type: integer
        temperature_now_c:
          type: number
        house_active_w:
          type: array
          items:
            type: integer
        house_apparent_va:
          type: array
          items:
            type: integer
        triac_active_w:
          type: array
          items:
            type: integer
        triac_apparent_va:
          type: array
          items:
            type: integer
        temperature_series_c:
          type: array
          items:
            type: number

    HistoryEnergyDaily:
      type: object
      properties:
        delta_wh_per_day:
          type: array
          items:
            type: integer
        count:
          type: integer
        idx_prom_du_jour:
          type: integer
        import_wh_per_day:
          type: array
          items:
            type: integer
        export_wh_per_day:
          type: array
          items:
            type: integer
        day_dates_iso:
          type: array
          items:
            type: string
        days_capacity:
          type: integer
        days_retained:
          type: integer
        total_count:
          type: integer
        offset:
          type: integer
        limit:
          type: integer
        has_more:
          type: boolean
        pending_commit:
          type: boolean
          description: >
            True when daily ring is staged in RAM and NVS flush is still pending
            (see helio_loop commit).
        ch1_import_wh_per_day:
          type: array
          items:
            type: integer
        ch1_export_wh_per_day:
          type: array
          items:
            type: integer
        ch2_import_wh_per_day:
          type: array
          items:
            type: integer
        ch2_export_wh_per_day:
          type: array
          items:
            type: integer
        items:
          type: array
          items:
            type: object
            properties:
              date_iso:
                type: string
              delta_wh:
                type: integer
              ch1_import_wh:
                type: integer
              ch1_export_wh:
                type: integer
              ch2_import_wh:
                type: integer
              ch2_export_wh:
                type: integer

    RouterConfig:
      type: object
      additionalProperties: true
      properties:
        dhcp_on:
          type: boolean
        ip_fixed:
          type: string
        gateway:
          type: string
        subnet_mask:
          type: string
        dns:
          type: string
        source:
          type: string
          description: Active source wire label (JsyMk194, Linky, HelioPeer, …)
        peer_ip:
          type: string
        peer_port:
          type: integer
        peer_path:
          type: string
        peer_protocol:
          type: string
          enum: [json]
        enphase_user:
          type: string
        enphase_password:
          type: string
        meter_channel:
          type: string
        enphase_serial:
          type: string
        mqtt_repeat_sec:
          type: integer
        mqtt_ip:
          type: string
        mqtt_port:
          type: integer
        mqtt_user:
          type: string
        mqtt_password:
          type: string
        mqtt_prefix:
          type: string
        mqtt_device_name:
          type: string
        router_name:
          type: string
        probe_second_name:
          type: string
        probe_house_name:
          type: string
        temperature_label:
          type: string
        calib_u:
          type: integer
        calib_i:
          type: integer
        pmqtt_topic:
          type: string
        pmqtt_schema:
          type: string
        pmqtt_bindings:
          type: array
          description: >
            Source Pmqtt per-metric bindings. When present and non-empty, firmware prefers
            this table over single-topic fields `pmqtt_topic` and `pmqtt_schema` when bindings are empty.
          maxItems: 24
          items:
            $ref: "#/components/schemas/PmqttBinding"
        jsy_mk333_serial_baud:
          type: integer
        install_country:
          type: string
        install_country_variant:
          type: string
        mains_nominal_v:
          type: integer
        mains_frequency_mode:
          type: string
          enum: [auto, manual]
        mains_frequency_hz_manual:
          type: integer
          enum: [50, 60]
        mains_frequency_effective_hz:
          type: number
        mains_frequency_source:
          type: string
        mains_frequency_warning:
          type: string
          nullable: true
        triac_override_max_temp_c:
          type: integer
        http_cors_enabled:
          type: boolean
        pwm_gpio:
          type: integer
        pwm_mode:
          type: string
        pwm_duty_percent:
          type: integer
        pwm_inverted:
          type: boolean
        tempo_rte_enabled:
          type: boolean
        triac_cal_enabled:
          type: boolean
        triac_calibration:
          type: array
          items:
            type: object
            properties:
              duty_pct:
                type: integer
              measured_w:
                type: integer
        hunting_reversal_threshold:
          type: integer
        hunting_window_min:
          type: integer
        expert_regulation_mode:
          type: integer
        regulation_gain:
          type: integer
        vacation_enabled:
          type: boolean
        vacation_end_epoch:
          type: integer
        max_routed_w:
          type: integer
        triac_off_when_source_stale:
          type: boolean
        triac_backoff_when_heater_idle:
          type: boolean
        mqtt_json_commands:
          type: boolean
        action_daily_cap_wh:
          type: array
          items:
            type: integer

    ConfigEnvelope:
      type: object
      required: [schema_version, config]
      properties:
        schema_version:
          type: integer
          example: 4
        config:
          $ref: "#/components/schemas/RouterConfig"

    ConfigPutBody:
      type: object
      required: [config]
      properties:
        config:
          $ref: "#/components/schemas/RouterConfig"

    PmqttBinding:
      type: object
      required: [metric, topic, format]
      properties:
        metric:
          type: string
