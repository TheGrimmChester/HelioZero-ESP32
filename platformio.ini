; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = wroom32
src_dir = firmware
test_dir = firmware/test/native

[env:wroom32]
platform = espressif32@6.4.0
board = esp32dev
framework = arduino
build_src_filter = 
	+<*>
	-<test/native>
board_build.partitions = firmware/partitions.csv
monitor_speed = 115200
extra_scripts = 
	pre:build_web.py
	pre:extra_scripts/set_firmware_version.py
	pre:extra_scripts/patch_remote_debug_ws.py
build_flags = 
	-Os
	-DCORE_DEBUG_LEVEL=0
	-DHELIO_REMOTE_DEBUG=0
	-DCONFIG_MBEDTLS_SSL_IN_CONTENT_LEN=16384
	-DCONFIG_MBEDTLS_SSL_OUT_CONTENT_LEN=8192
	-I${PROJECT_DIR}/firmware/core
	-I${PROJECT_DIR}/firmware/metering
	-I${PROJECT_DIR}/firmware/api
	-ffunction-sections
	-fdata-sections
	-Wl,--gc-sections
lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^6.21.5
  paulstoffregen/OneWire@2.3.7
  milesburton/DallasTemperature@3.11.0
  https://github.com/plageoj/urlencode.git

; Pre-release style Version: {base}-{branch}.{short_sha} (same as GitHub main pre-releases).
; Example: pio run -e wroom32_prerelease  → 0.1.0-main.abc1234 on main @ abc1234
[env:wroom32_prerelease]
extends = env:wroom32

; Network OTA: HELIO_UPLOAD_PORT=192.168.x.x pio run -e wroom32_ota -t upload
[env:wroom32_ota]
extends = env:wroom32
upload_protocol = espota
upload_port = ${sysenv.HELIO_UPLOAD_PORT}

[env:hil]
extends = env:wroom32
build_unflags = 
	-DHELIO_REMOTE_DEBUG=0
build_flags = 
	${env:wroom32.build_flags}
	-DHELIO_REMOTE_DEBUG=1
	-DHELIO_ZERO_ENABLE_SOURCE_TEST_API=1
lib_deps = 
	${env:wroom32.lib_deps}
	https://github.com/JoaoLopesF/RemoteDebug.git

[env:esp32s3]
extends = env:wroom32
board = esp32-s3-devkitc-1
board_build.partitions = firmware/partitions_s3.csv
lib_deps =
	${env:wroom32.lib_deps}

[env:esp32c3_meter]
extends = env:wroom32
board = esp32-c3-devkitm-1
build_flags = 
	${env:wroom32.build_flags}
	-DMETER_ONLY_BUILD=1
build_src_filter = 
	+<*>
	-<test/native>
lib_deps =
	${env:wroom32.lib_deps}

[env:native]
platform = native
test_framework = googletest
test_build_src = true
test_filter = *
build_flags = 
	-std=gnu++17
	-DFLEET_BUNDLE_NATIVE_STUB=1
	-DAPI_TOKEN_NATIVE_STUB=1
	-I${PROJECT_DIR}/firmware/test/native/stubs
	-I${PROJECT_DIR}/firmware/core
	-I${PROJECT_DIR}/firmware/metering
build_src_filter = 
	-<*>
	+<core/api_util_logic.cpp>
	+<core/api_session_logic.cpp>
	+<core/json_field_parse.cpp>
	+<core/actions_logic.cpp>
	+<core/helio_meter_logic.cpp>
	+<core/helio_regulation_logic.cpp>
	+<core/helio_regulation_state.cpp>
	+<core/helio_regulation_persist.cpp>
	+<core/helio_triac_logic.cpp>
	+<metering/storage_eeprom_layout.cpp>
	+<metering/storage_eeprom_ram.cpp>
	+<metering/storage_eeprom_extension.cpp>
	+<metering/jsy_mk194_logic.cpp>
	+<metering/linky_tic_logic.cpp>
	+<metering/shelly_em_logic.cpp>
	+<core/helio_source_logic.cpp>
	+<core/actions_api_logic.cpp>
	+<core/mqtt_ha_logic.cpp>
	+<core/mqtt_ha_command_logic.cpp>
	+<core/helio_meter_json_logic.cpp>
	+<core/day_replay_logic.cpp>
	+<metering/json_flat_meter_logic.cpp>
	+<metering/external_peer_logic.cpp>
	+<metering/tempo_rte_logic.cpp>
	+<metering/helio_http_response_logic.cpp>
	+<metering/pmqtt_logic.cpp>
	+<metering/jsy_mk333_logic.cpp>
	+<core/helio_pwm_logic.cpp>
	+<core/helio_pulse_modes_tables.cpp>
	+<core/fleet_bundle_logic.cpp>
	+<core/api_token_logic.cpp>
	+<core/api_access_token.cpp>
	+<core/uxi_adc_clip_logic.cpp>
	+<core/helio_source_health_logic.cpp>
	+<core/helio_regulation_hunting_logic.cpp>
	+<core/helio_vacation_logic.cpp>
	+<core/helio_action_cap_logic.cpp>
	+<core/helio_site_cap_logic.cpp>
	+<core/helio_ha_site_persist.cpp>
	+<core/helio_heater_load_feedback_logic.cpp>
	+<core/mqtt_ha_events_logic.cpp>
	+<core/mqtt_ha_json_config_logic.cpp>
	+<core/helio_triac_calibration_logic.cpp>
	+<core/helio_config_audit_keys.cpp>
	+<core/helio_device_id_logic.cpp>
	+<core/helio_config_daily_cap_logic.cpp>
	+<test/native/stubs/helio_triac_globals_stub.cpp>

[env:native-coverage]
extends = env:native
extra_scripts = 
	pre:extra_scripts/native_coverage_flags.py
